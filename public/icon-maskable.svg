<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="50%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    <linearGradient id="neon-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#d946ef" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a5b4fc" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background for maskable icon must stretch to edges, no round corners or margins are safe because Android will clip it dynamically -->
  <rect width="512" height="512" fill="url(#bg-grad)" />

  <!-- Database / Spreadsheet Flow Premium Graphic (Scaled down to 70% to reside entirely within safe area) -->
  <g transform="translate(76.8, 76.8) scale(0.7)">
    <g transform="translate(128, 100)" filter="url(#glow)">
      <!-- Cylinder 3 (Bottom) -->
      <g transform="translate(0, 180)">
        <path d="M 0,30 L 0,70 C 0,95 57,110 128,110 C 199,110 256,95 256,70 L 256,30" fill="none" stroke="url(#neon-grad)" stroke-width="16" stroke-linecap="round" />
        <ellipse cx="128" cy="30" rx="128" ry="30" fill="#0f172a" stroke="url(#neon-grad)" stroke-width="10" />
        <ellipse cx="128" cy="30" rx="100" ry="20" fill="url(#neon-grad)" opacity="0.15" />
      </g>

      <!-- Cylinder 2 (Middle) -->
      <g transform="translate(0, 90)">
        <path d="M 0,30 L 0,70 C 0,95 57,110 128,110 C 199,110 256,95 256,70 L 256,30" fill="none" stroke="url(#neon-grad)" stroke-width="16" stroke-linecap="round" />
        <ellipse cx="128" cy="30" rx="128" ry="30" fill="#0f172a" stroke="url(#neon-grad)" stroke-width="10" />
        <ellipse cx="128" cy="30" rx="100" ry="20" fill="url(#neon-grad)" opacity="0.15" />
      </g>

      <!-- Cylinder 1 (Top) -->
      <g transform="translate(0, 0)">
        <path d="M 0,30 L 0,70 C 0,95 57,110 128,110 C 199,110 256,95 256,70 L 256,30" fill="none" stroke="url(#neon-grad)" stroke-width="16" stroke-linecap="round" />
        <ellipse cx="128" cy="30" rx="128" ry="30" fill="#020617" stroke="url(#neon-grad)" stroke-width="12" />
        <ellipse cx="128" cy="30" rx="104" ry="22" fill="url(#accent-grad)" />
      </g>

      <!-- Flow Connectors (Representing Sheet-to-Task sync) -->
      <path d="M 60,30 L 60,210" stroke="#10b981" stroke-width="6" stroke-linecap="round" opacity="0.7" stroke-dasharray="10 15" />
      <path d="M 196,30 L 196,210" stroke="#10b981" stroke-width="6" stroke-linecap="round" opacity="0.7" stroke-dasharray="10 15" />
      
      <!-- Central Flow Arrow -->
      <path d="M 128,45 L 128,165" stroke="#f43f5e" stroke-width="8" stroke-linecap="round" opacity="0.8" />
      <path d="M 112,145 L 128,165 L 144,145" fill="none" stroke="#f43f5e" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.8" />
    </g>
  </g>
</svg>
